<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>FoodTales - Detalle del plato</title>
    <link rel="stylesheet" href="../css/dish-detail.css">
</head>
<body class="dark">
    <div id="dishHeroRoot"></div>

    <div class="container">
        <div id="dishContent">
            <!-- El contenido se carga dinámicamente -->
            <div style="text-align: center; padding: 3rem;">Cargando...</div>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-item" data-page="home">🏠</button>
        <button class="nav-item" data-page="map">📍</button>
        <button class="nav-item" data-page="favorites">❤️</button>
        <button class="nav-item" data-page="profile">👤</button>
    </div>

    <!-- Toast (se muestra al guardar en favoritos) -->
    <div id="toast" class="toast" aria-hidden="true">Guardado en Favoritos</div>

    <script src="../js/data.js"></script>
    <script>
    (async function(){
        const body = document.body;

        function loadTheme() {
            const savedTheme = localStorage.getItem('foodtales_theme');
            if (savedTheme === 'light') {
                body.classList.remove('dark');
                body.classList.add('light');
            } else {
                body.classList.remove('light');
                body.classList.add('dark');
            }
        }

        function initThemeToggle() {
            const themeToggleEl = document.getElementById('themeToggle');
            if (!themeToggleEl) return;
            themeToggleEl.textContent = body.classList.contains('light') ? '☀️' : '🌙';
            themeToggleEl.addEventListener('click', () => {
                if (body.classList.contains('dark')) {
                    body.classList.remove('dark');
                    body.classList.add('light');
                    localStorage.setItem('foodtales_theme', 'light');
                    themeToggleEl.textContent = '☀️';
                } else {
                    body.classList.remove('light');
                    body.classList.add('dark');
                    localStorage.setItem('foodtales_theme', 'dark');
                    themeToggleEl.textContent = '🌙';
                }
            });
        }

        loadTheme();

        // ----- OBTENER ID DEL PLATO DESDE URL -----
        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        const platoId = getQueryParam('id') || getQueryParam('dish');
        const platosData = await window.loadPlatos();
        const plato = (platosData || []).find(p => p.id === platoId);

        function normalizeText(text) {
            return text ? text.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase() : '';
        }

        function getCurrentUserAllergies() {
            const currentUser = JSON.parse(localStorage.getItem('foodtales_current_user'));
            if (!currentUser) return [];
            const users = JSON.parse(localStorage.getItem('foodtales_users')) || [];
            const user = users.find(u => u.email === currentUser.email);
            return (user?.profileData?.alergias || []).map(normalizeText).filter(Boolean);
        }

        function getDishAllergyWarning(plato) {
            const allergies = getCurrentUserAllergies();
            if (!allergies.length) return '';

            const ingredients = (plato.ingredientes || []).map(normalizeText);
            const name = normalizeText(plato.nombre);
            const found = allergies.filter(allergy => {
                return ingredients.some(ing => ing.includes(allergy)) || name.includes(allergy);
            });

            if (found.length) {
                const uniqueAllergies = [...new Set(found)].join(', ');
                return `Cuidado: puede contener ${uniqueAllergies}.`;
            }
            return '';
        }

        function checkDishAllergies(plato) {
            const warning = getDishAllergyWarning(plato);
            if (!warning) return false;
            alert(`Cuidado: este plato contiene ingredientes relacionados con tu alergia a ${warning.replace('Cuidado: puede contener ', '')}`);
            return true;
        }

        if (!plato) {
            document.getElementById('dishContent').innerHTML = '<div style="text-align: center; padding: 3rem;">🍽️ Plato no encontrado<br><button class="map-btn" onclick="window.location.href=\'home.html\'">Volver al inicio</button></div>';
        } else {
            checkDishAllergies(plato);
        }

        // Toast helper
        function showToast(message = 'Guardado en Favoritos') {
            const toast = document.getElementById('toast');
            if (!toast) return;
            toast.textContent = message;
            toast.setAttribute('aria-hidden', 'false');
            toast.classList.remove('show');
            // force reflow
            void toast.offsetWidth;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
                toast.setAttribute('aria-hidden', 'true');
            }, 2400);
        }

        // Convierte varias formas de URLs de YouTube a la URL embebible
        function getEmbeddableUrl(videoUrl) {
            try {
                const u = new URL(videoUrl);
                const host = u.hostname.replace('www.', '');
                if (host.includes('youtube.com')) {
                    const v = u.searchParams.get('v');
                    if (v) return `https://www.youtube.com/embed/${v}?rel=0`;
                    if (u.pathname.startsWith('/embed/')) return videoUrl;
                }
                if (host.includes('youtu.be')) {
                    const id = u.pathname.replace(/^\//, '');
                    return `https://www.youtube.com/embed/${id}?rel=0`;
                }
                return videoUrl;
            } catch (e) {
                return videoUrl;
            }
        }

        // ----- RENDERIZAR DETALLE (diseño nuevo, imagen como hero) -----
        function renderDetalle() {
            const favoritoActual = isFavorito(plato.id);
            const heroHtml = `
                <div class="dish-hero" aria-label="${plato.nombre}">
                    <img class="dish-hero-image" src="${plato.imagen}" alt="${plato.nombre}" onerror="this.src='https://placehold.co/800x600?text=${encodeURIComponent(plato.nombre)}'">
                    <div class="dish-hero-gradient"></div>

                    <div class="hero-top-bar">
                        <button class="btn-circle back-button" id="backHeroBtn" aria-label="Volver">←</button>
                        <div class="hero-actions-right">
                            <button class="btn-circle favorite-button ${favoritoActual ? 'active' : ''}" id="favHeroBtn" aria-label="Guardar">${favoritoActual ? '❤️' : '🤍'}</button>
                            <button class="btn-circle" id="themeToggle" aria-label="Alternar tema">🌙</button>
                        </div>
                    </div>
                </div>
            `;

            const contentHtml = `
                <div class="dish-info">
                    ${getDishAllergyWarning(plato) ? `<div class="allergy-warning">⚠️ ${getDishAllergyWarning(plato)}</div>` : ''}
                    <h1 class="dish-title">${plato.nombre}</h1>
                    <div class="dish-meta-row">
                        <span class="meta-item">🏠 ${plato.restaurante}</span>
                        <span class="meta-item">📍 ${plato.distancia} km</span>
                        <span class="meta-item">⏱️ ${plato.tiempoCaminando} min</span>
                        <span class="meta-item">💵 ${plato.moneda || ''} ${plato.precio.toLocaleString()}</span>
                    </div>

                    <div class="content-actions hero-ctas">
                        <div class="action-primary">
                            <button class="cta-primary goTryBtn">↗ Go Try This</button>
                        </div>
                        <div class="action-row cta-secondary-row">
                            <button class="cta-secondary viewMapBtn">📍 View on Map</button>
                            <button class="cta-secondary comparePlacesBtn">↔ Compare Places</button>
                        </div>
                    </div>
                </div>

                <div class="featured-card">
                    <div class="featured-header">📺 Mira y Aprende</div>
                    ${plato.videoUrl ? `
                        <div class="featured-media">
                            <div class="video-container">
                                <iframe src="${getEmbeddableUrl(plato.videoUrl)}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                            </div>
                        </div>
                    ` : `
                        <div class="featured-media">
                            <img src="${plato.imagen}" alt="${plato.nombre}">
                        </div>
                    `}
                </div>

                <div class="accordion" id="acc-historia">
                    <button class="accordion-toggle" aria-expanded="false" aria-controls="acc-historia-panel">
                        <span class="accordion-title">📖 Historia del plato</span>
                        <span class="accordion-icon">˅</span>
                    </button>
                    <div class="accordion-panel" id="acc-historia-panel"><p>${plato.historia}</p></div>
                </div>

                <div class="accordion" id="acc-ingredientes">
                    <button class="accordion-toggle" aria-expanded="false" aria-controls="acc-ingredientes-panel">
                        <span class="accordion-title">🥘 Ingredientes</span>
                        <span class="accordion-icon">˅</span>
                    </button>
                    <div class="accordion-panel" id="acc-ingredientes-panel">
                        <div class="ingredientes-list">
                            ${plato.ingredientes.map(ing => `<span class="ingrediente-chip">${ing}</span>`).join('')}
                        </div>
                    </div>
                </div>

                <div class="accordion" id="acc-datos">
                    <button class="accordion-toggle" aria-expanded="false" aria-controls="acc-datos-panel">
                        <span class="accordion-title">💡 Datos curiosos</span>
                        <span class="accordion-icon">˅</span>
                    </button>
                    <div class="accordion-panel" id="acc-datos-panel">
                        <ul class="curiosidades">
                            ${plato.datosCuriosos.map(dato => `<li>📌 ${dato}</li>`).join('')}
                        </ul>
                    </div>
                </div>

                <div class="reviews-card">
                    <h3>🍽️ Qué opinan los comensales</h3>
                    ${plato.reviews.map(review => `
                        <div class="review">
                            <div class="review-header">
                                <span>${review.usuario}</span>
                                <span class="review-stars">${'⭐'.repeat(review.estrellas)} ${review.estrellas}</span>
                            </div>
                            <div class="review-text">"${review.comentario}"</div>
                            <div class="review-date">📅 ${review.fecha}</div>
                        </div>
                    `).join('')}
                </div>
            `;

            // inject hero separately (outside the constrained container)
            const heroRoot = document.getElementById('dishHeroRoot');
            if (heroRoot) heroRoot.innerHTML = heroHtml;
            // attach theme toggle after hero exists
            initThemeToggle();

            document.getElementById('dishContent').innerHTML = contentHtml;

            // Eventos dinámicos (CTAs) — attach to hero and content buttons by class
            document.querySelectorAll('.goTryBtn').forEach(b => b.addEventListener('click', () => {
                const url = `https://www.google.com/maps/dir/?api=1&destination=${plato.lat},${plato.lng}`;
                window.open(url, '_blank');
            }));

            document.querySelectorAll('.viewMapBtn').forEach(b => b.addEventListener('click', () => {
                window.location.href = `map.html?dish=${plato.id}`;
            }));

            document.querySelectorAll('.comparePlacesBtn').forEach(b => b.addEventListener('click', () => {
                window.location.href = `compare.html?dish=${plato.id}`;
            }));

            // Floating favorite button (top-right)
            document.getElementById('favHeroBtn')?.addEventListener('click', () => {
                const favBtn = document.getElementById('favHeroBtn');
                if (isFavorito(plato.id)) {
                    removeFavorito(plato.id);
                    if (favBtn) favBtn.textContent = '🤍';
                } else {
                    addFavorito(plato.id);
                    if (favBtn) { favBtn.textContent = '❤️'; favBtn.classList.add('active'); }
                    showToast('Guardado en Favoritos');
                }
            });

            // Back button (floating)
            document.getElementById('backHeroBtn')?.addEventListener('click', () => {
                window.history.back();
            });

            // Accordions: smooth toggle (expand to full height without cutting content)
            document.querySelectorAll('.accordion').forEach(acc => {
                const btn = acc.querySelector('.accordion-toggle');
                const panel = acc.querySelector('.accordion-panel');
                // initial closed state
                panel.style.maxHeight = '0px';
                panel.style.overflow = 'hidden';
                panel.style.paddingTop = '0px';
                panel.style.paddingBottom = '0px';

                btn.addEventListener('click', () => {
                    const isOpen = acc.classList.contains('open');
                    if (!isOpen) {
                        // opening: animate to scrollHeight then remove maxHeight to allow natural height
                        acc.classList.add('open');
                        panel.style.overflow = 'hidden';
                        const target = panel.scrollHeight;
                        panel.style.maxHeight = target + 'px';
                        panel.style.paddingTop = '';
                        panel.style.paddingBottom = '';
                        acc.querySelector('.accordion-icon').style.transform = 'rotate(180deg)';
                        btn.setAttribute('aria-expanded', 'true');

                        const onEnd = (e) => {
                            if (e.target !== panel) return;
                            // allow content to size naturally
                            panel.style.maxHeight = 'none';
                            panel.style.overflow = 'visible';
                            panel.removeEventListener('transitionend', onEnd);
                        };
                        panel.addEventListener('transitionend', onEnd);
                    } else {
                        // closing: set explicit height then collapse to 0
                        panel.style.overflow = 'hidden';
                        // if currently 'none', set to current scrollHeight first
                        if (panel.style.maxHeight === 'none') {
                            panel.style.maxHeight = panel.scrollHeight + 'px';
                        }
                        // force reflow
                        void panel.offsetHeight;
                        panel.style.paddingTop = '0px';
                        panel.style.paddingBottom = '0px';
                        panel.style.maxHeight = '0px';
                        acc.classList.remove('open');
                        acc.querySelector('.accordion-icon').style.transform = 'rotate(0deg)';
                        btn.setAttribute('aria-expanded', 'false');
                    }
                });
            });
        }

            if (plato) renderDetalle();

        // ----- NAVEGACIÓN del footer -----
        document.querySelectorAll('.nav-item').forEach(btn => {
            btn.addEventListener('click', () => {
                const page = btn.getAttribute('data-page');
                if (page === 'home') window.location.href = 'home.html';
                else if (page === 'map') window.location.href = 'map.html';
                else if (page === 'favorites') window.location.href = 'favorites.html';
                else if (page === 'profile') window.location.href = 'profile.html';
            });
        });
    })();
    </script>
</body>
</html>
