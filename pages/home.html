<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>FoodTales - Inicio</title>
    <link rel="stylesheet" href="../css/home.css">
</head>
<body class="dark">
    <div class="container">
        <div class="header">
            <div class="logo">
                <h1>🍜 FoodTales</h1>
                <p>Descubre sabores cerca de ti</p>
            </div>
            <div class="user-info">
                <span id="userNameDisplay"></span>
                <button class="theme-toggle" id="themeToggle">🌙</button>
            </div>
        </div>

        <!-- Evento Burger Master 2026 -->
        <div class="event-card">
            <div class="event-title">🍔 Burger Master 2026</div>
            <div class="event-subtitle">El mejor festival de hamburguesas de la ciudad</div>
            <button class="event-btn" id="exploreEventBtn">Explorar evento ➡️</button>
        </div>

        <!-- Título sección -->
        <div class="section-title">🍽️ ¿Qué quieres comer ahora?</div>

        <!-- Grid de categorías -->
        <div class="categories-grid">
            <div class="category-card" data-category="desayuno">
                <div class="category-icon">🍳</div>
                <div class="category-name">Desayuno</div>
            </div>
            <div class="category-card" data-category="almuerzo">
                <div class="category-icon">🍲</div>
                <div class="category-name">Almuerzo</div>
            </div>
            <div class="category-card" data-category="cena">
                <div class="category-icon">🍽️</div>
                <div class="category-name">Cena</div>
            </div>
            <div class="category-card" data-category="postre">
                <div class="category-icon">🍰</div>
                <div class="category-name">Postre</div>
            </div>
        </div>

        <!-- Botón explorar en el mapa -->
        <div class="map-btn-container">
            <button class="map-btn" id="exploreMapBtn">📍 Explorar en el mapa</button>
        </div>
    </div>

    <!-- Bottom navigation -->
    <div class="bottom-nav">
        <button class="nav-item active" data-page="home">🏠</button>
        <button class="nav-item" data-page="map">📍</button>
        <button class="nav-item" data-page="favorites">❤️</button>
        <button class="nav-item" data-page="profile">👤</button>
    </div>

    <script src="../js/data.js"></script>
    <script>
        // ----- TEMA OSCURO/CLARO -----
        const themeToggle = document.getElementById('themeToggle');
        const body = document.body;
        
        function loadTheme() {
            const savedTheme = localStorage.getItem('foodtales_theme');
            if (savedTheme === 'light') {
                body.classList.remove('dark');
                body.classList.add('light');
                themeToggle.textContent = '☀️';
            } else {
                body.classList.remove('light');
                body.classList.add('dark');
                themeToggle.textContent = '🌙';
            }
        }
        
        themeToggle.addEventListener('click', () => {
            if (body.classList.contains('dark')) {
                body.classList.remove('dark');
                body.classList.add('light');
                localStorage.setItem('foodtales_theme', 'light');
                themeToggle.textContent = '☀️';
            } else {
                body.classList.remove('light');
                body.classList.add('dark');
                localStorage.setItem('foodtales_theme', 'dark');
                themeToggle.textContent = '🌙';
            }
        });
        
        loadTheme();
        
        // ----- MOSTRAR NOMBRE DEL USUARIO -----
        function loadUserName() {
            const currentUser = JSON.parse(localStorage.getItem('foodtales_current_user'));
            if (currentUser && currentUser.name) {
                document.getElementById('userNameDisplay').textContent = `👋 ${currentUser.name.split(' ')[0]}`;
            } else {
                document.getElementById('userNameDisplay').textContent = `👋 FoodLover`;
            }
        }
        loadUserName();
        
        // ----- EVENTOS -----
        document.getElementById('exploreEventBtn').addEventListener('click', () => {
            window.location.href = 'event.html';
        });
        
        document.getElementById('exploreMapBtn').addEventListener('click', () => {
            window.location.href = 'map.html';
        });
        
        // ----- CATEGORÍAS SELECCIONABLES -----
        let selectedCategory = null;
        
        document.querySelectorAll('.category-card').forEach(card => {
            card.addEventListener('click', () => {
                const category = card.getAttribute('data-category');
                
                // Remover clase selected de todas las categorías
                document.querySelectorAll('.category-card').forEach(c => {
                    c.classList.remove('selected');
                });
                
                // Agregar clase selected a la categoría clickeada
                card.classList.add('selected');
                selectedCategory = category;
                
                // Mostrar feedback visual
                console.log(`🍽️ Categoría seleccionada: ${category}`);
                
                // Aquí puedes agregar la lógica para mostrar platos de esa categoría
                // mostrarPlatosPorCategoria(category);
            });
        });
        
        // ----- NAVEGACIÓN UNIFICADA -----
        document.querySelectorAll('.nav-item').forEach(btn => {
            btn.addEventListener('click', () => {
                const page = btn.getAttribute('data-page');
                if (page === 'home') window.location.href = 'home.html';
                else if (page === 'map') window.location.href = 'map.html';
                else if (page === 'favorites') window.location.href = 'favorites.html';
                else if (page === 'profile') window.location.href = 'profile.html';
            });
        });
    </script>
</body>
</html>
