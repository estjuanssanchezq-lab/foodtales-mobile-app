<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>FoodTales - Comparar platos</title>
    <link rel="stylesheet" href="../css/compare.css">
</head>
<body class="dark">
    <div class="container">
        <div class="compare-top">
            <div class="left">
                <button class="btn-circle back-btn" id="backBtn" aria-label="Volver">←</button>
            </div>
            <div class="center">
                <img class="compare-thumb" id="compareThumb" src="" alt="">
                <div class="compare-title">
                    <div class="dish-name" id="compareDishName">Plato</div>
                    <div class="subtitle">Escoge dónde probarlo</div>
                </div>
            </div>
            <div class="right">
                <button class="btn-circle" id="themeToggle">🌙</button>
            </div>
        </div>

        <div id="compareContent">
            <div style="text-align: center; padding: 3rem;">Cargando...</div>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-item" data-page="home">🏠</button>
        <button class="nav-item" data-page="map">📍</button>
        <button class="nav-item" data-page="favorites">❤️</button>
        <button class="nav-item" data-page="profile">👤</button>
    </div>

    <script src="../js/data.js"></script>
    <script>
    (async function(){
        const body = document.body;

        function loadTheme() {
            const savedTheme = localStorage.getItem('foodtales_theme');
            if (savedTheme === 'light') {
                body.classList.remove('dark');
                body.classList.add('light');
            } else {
                body.classList.remove('light');
                body.classList.add('dark');
            }
        }

        function initThemeToggle() {
            const themeToggle = document.getElementById('themeToggle');
            if (!themeToggle) return;
            themeToggle.textContent = body.classList.contains('light') ? '☀️' : '🌙';
            themeToggle.addEventListener('click', () => {
                if (body.classList.contains('dark')) {
                    body.classList.remove('dark');
                    body.classList.add('light');
                    localStorage.setItem('foodtales_theme', 'light');
                    themeToggle.textContent = '☀️';
                } else {
                    body.classList.remove('light');
                    body.classList.add('dark');
                    localStorage.setItem('foodtales_theme', 'dark');
                    themeToggle.textContent = '🌙';
                }
            });
        }

        loadTheme();

        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        const dishId = getQueryParam('dish');
        const platosData = await window.loadPlatos();
        let plato = (platosData || []).find(p => p.id === dishId);
        if (!plato) plato = (platosData && platosData.length) ? platosData[0] : null;

        if (!plato) {
            document.getElementById('compareContent').innerHTML = `<div class="no-compare"><p>😢 No hay datos disponibles.</p></div>`;
            return;
        }

        // Header
        document.getElementById('compareDishName').textContent = plato.nombre;
        const thumb = document.getElementById('compareThumb');
        thumb.src = plato.imagen;
        thumb.alt = plato.nombre;

        function renderRestaurantCard(plato) {
            return `
                <div class="restaurant-list">
                    <div class="restaurant-card top-pick">
                        <div class="restaurant-header">
                            <div>
                                <div class="restaurant-name">${plato.restaurante}</div>
                                <div class="restaurant-address">${plato.direccion}</div>
                            </div>
                            <div class="badge">Top Pick</div>
                        </div>

                        <div class="info-grid-2x2">
                            <div class="info-box">
                                <div class="info-icon">📍</div>
                                <div class="info-meta"><div class="info-label">Distancia</div><div class="info-value">${plato.distancia} km</div></div>
                            </div>
                            <div class="info-box">
                                <div class="info-icon">⏱️</div>
                                <div class="info-meta"><div class="info-label">Caminando</div><div class="info-value">${plato.tiempoCaminando} min</div></div>
                            </div>
                            <div class="info-box">
                                <div class="info-icon">💵</div>
                                <div class="info-meta"><div class="info-label">Precio</div><div class="info-value">${plato.moneda || ''} ${plato.precio.toLocaleString()}</div></div>
                            </div>
                            <div class="info-box">
                                <div class="info-icon">⭐</div>
                                <div class="info-meta"><div class="info-label">Rating</div><div class="info-value">${plato.estrellas}</div></div>
                            </div>
                        </div>

                        <div class="schedule"><strong>Horario</strong><div>${plato.horarios}</div></div>

                        <button class="btn-try" id="tryHereBtn">↗ Try Here</button>
                    </div>
                </div>
            `;
        }

        document.getElementById('compareContent').innerHTML = renderRestaurantCard(plato);

        document.getElementById('tryHereBtn')?.addEventListener('click', () => {
            const url = `https://www.google.com/maps/dir/?api=1&destination=${plato.lat},${plato.lng}`;
            window.open(url, '_blank');
        });

        document.getElementById('backBtn').addEventListener('click', () => {
            window.history.back();
        });

        initThemeToggle();

        document.querySelectorAll('.nav-item').forEach(btn => {
            btn.addEventListener('click', () => {
                const page = btn.getAttribute('data-page');
                if (page === 'home') window.location.href = 'home.html';
                else if (page === 'map') window.location.href = 'map.html';
                else if (page === 'favorites') window.location.href = 'favorites.html';
                else if (page === 'profile') window.location.href = 'profile.html';
            });
        });
    })();
    </script>
</body>
</html>
