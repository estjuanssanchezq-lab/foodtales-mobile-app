<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>FoodTales - Inicio de Sesión</title>
    <link rel="stylesheet" href="css/index.css">
</head>
<body class="dark">
    <div class="card">
        <div class="header">
            <div class="logo">
                <h1>🍜 FoodTales</h1>
                <p class="logo-sub">sabores que cuentan historias</p>
            </div>
            <button class="theme-toggle" id="themeToggle">🌙</button>
        </div>

        <!-- Login Form (visible por defecto) -->
        <div id="loginForm">
            <h2 class="form-title" data-i18n="welcome">Bienvenidx</h2>
            <div class="input-group">
                <label data-i18n="email">📧 Correo electrónico</label>
                <input type="email" id="loginEmail" placeholder="tú@ejemplo.com">
            </div>
            <div class="input-group">
                <label data-i18n="password">🔒 Contraseña</label>
                <input type="password" id="loginPassword" placeholder="••••••••">
            </div>
            <button class="btn" id="loginBtn" data-i18n="loginBtn">Iniciar sesión</button>
            <div class="switch-link" id="goToRegister" data-i18n="goToRegister">✨ ¿No tienes cuenta? Créala aquí</div>
            <div id="loginMessage" class="message"></div>
        </div>

        <!-- Register Form (oculto al inicio) -->
        <div id="registerForm" style="display: none;">
            <h2 class="form-title" data-i18n="createAccount">Crear cuenta</h2>
            <div class="input-group">
                <label data-i18n="fullNameReg">🧑‍🍳 Nombre completo</label>
                <input type="text" id="regName" placeholder="Tu nombre">
            </div>
            <div class="input-group">
                <label data-i18n="email">📧 Correo electrónico</label>
                <input type="email" id="regEmail" placeholder="tú@ejemplo.com">
            </div>
            <div class="input-group">
                <label data-i18n="password">🔒 Contraseña</label>
                <input type="password" id="regPassword" placeholder="Mínimo 4 caracteres">
            </div>
            <div class="input-group">
                <label data-i18n="confirmPassword">🔁 Confirmar contraseña</label>
                <input type="password" id="regConfirmPassword" placeholder="Repite la contraseña">
            </div>
            <div class="input-group">
                <label data-i18n="languagePref">🌍 Idioma preferido</label>
                <select id="regLanguage">
                    <option value="español">Español</option>
                    <option value="inglés">English</option>
                </select>
            </div>
            <button class="btn" id="registerBtn" data-i18n="registerBtn">Registrarme</button>
            <div class="switch-link" id="goToLogin" data-i18n="goToLogin">⬅️ Ya tengo cuenta, iniciar sesión</div>
            <div id="registerMessage" class="message"></div>
        </div>
    </div>

    <script>
        // Use central i18n for login/register page
        function applyAuthPageTranslations() {
            if (window.i18n && typeof window.i18n.applyLanguage === 'function') {
                window.i18n.applyLanguage();
            }
            const t = (window.i18n && typeof window.i18n.t === 'function') ? window.i18n.t : (k => '');
            const loginEmail = document.getElementById('loginEmail');
            if (loginEmail) loginEmail.placeholder = t('emailPlaceholder') || loginEmail.placeholder;
            const regEmail = document.getElementById('regEmail');
            if (regEmail) regEmail.placeholder = t('emailPlaceholder') || regEmail.placeholder;
            const regName = document.getElementById('regName');
            if (regName) regName.placeholder = t('namePlaceholder') || regName.placeholder;
            const regPassword = document.getElementById('regPassword');
            if (regPassword) regPassword.placeholder = t('passwordPlaceholder') || regPassword.placeholder;
            const regConfirm = document.getElementById('regConfirmPassword');
            if (regConfirm) regConfirm.placeholder = t('confirmPlaceholder') || regConfirm.placeholder;
            const logoSub = document.querySelector('.logo-sub');
            if (logoSub) logoSub.textContent = t('logoSub') || logoSub.textContent;
        }

        // ----- TEMA OSCURO/CLARO -----
        const themeToggle = document.getElementById('themeToggle');
        const body = document.body;

        function loadTheme() {
            const savedTheme = localStorage.getItem('foodtales_theme');
            if (savedTheme === 'light') {
                body.classList.remove('dark');
                body.classList.add('light');
                themeToggle.textContent = '☀️';
            } else {
                body.classList.remove('light');
                body.classList.add('dark');
                themeToggle.textContent = '🌙';
            }
        }

        themeToggle.addEventListener('click', () => {
            if (body.classList.contains('dark')) {
                body.classList.remove('dark');
                body.classList.add('light');
                localStorage.setItem('foodtales_theme', 'light');
                themeToggle.textContent = '☀️';
            } else {
                body.classList.remove('light');
                body.classList.add('dark');
                localStorage.setItem('foodtales_theme', 'dark');
                themeToggle.textContent = '🌙';
            }
        });

        loadTheme();

        // ----- ALTERNAR FORMULARIOS -----
        const loginDiv = document.getElementById('loginForm');
        const registerDiv = document.getElementById('registerForm');
        const goToRegisterBtn = document.getElementById('goToRegister');
        const goToLoginBtn = document.getElementById('goToLogin');

        goToRegisterBtn.addEventListener('click', () => {
            loginDiv.style.display = 'none';
            registerDiv.style.display = 'block';
            clearMessages();
        });

        goToLoginBtn.addEventListener('click', () => {
            registerDiv.style.display = 'none';
            loginDiv.style.display = 'block';
            clearMessages();
        });

        function clearMessages() {
            document.getElementById('loginMessage').innerHTML = '';
            document.getElementById('registerMessage').innerHTML = '';
        }

        function showMessage(elementId, text, type, lang) {
            const msgDiv = document.getElementById(elementId);
            msgDiv.innerHTML = text;
            msgDiv.className = `message ${type}`;
            setTimeout(() => {
                if (msgDiv.innerHTML === text) msgDiv.innerHTML = '';
            }, 3000);
        }

        // ----- VALIDACIONES -----
        function validateEmail(email) {
            return /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/.test(email);
        }

        function saveUser(userData) {
            let users = JSON.parse(localStorage.getItem('foodtales_users')) || [];
            const exists = users.some(u => u.email === userData.email);
            if (exists) return false;
            users.push(userData);
            localStorage.setItem('foodtales_users', JSON.stringify(users));
            return true;
        }

        function findUserByEmail(email, password) {
            const users = JSON.parse(localStorage.getItem('foodtales_users')) || [];
            return users.find(u => u.email === email && u.password === password);
        }

        // Cargar idioma del usuario actual si existe sesión previa
        function loadUserLanguageFromSession() {
            const currentUser = JSON.parse(localStorage.getItem('foodtales_current_user'));
            let langCode = null;
            if (currentUser && currentUser.email) {
                const users = JSON.parse(localStorage.getItem('foodtales_users')) || [];
                const user = users.find(u => u.email === currentUser.email);
                if (user && user.language) {
                    langCode = (user.language === 'inglés') ? 'en' : 'es';
                }
            }
            // Fallback to saved global language or default to Spanish
            const saved = localStorage.getItem('foodtales-language');
            if (!langCode && saved) langCode = saved === 'en' ? 'en' : 'es';
            if (!langCode) langCode = 'es';

            if (window.i18n && typeof window.i18n.setLanguage === 'function') {
                window.i18n.setLanguage(langCode);
            } else {
                applyAuthPageTranslations();
            }
        }

        // Registrar
        document.getElementById('registerBtn').addEventListener('click', () => {
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirmPassword').value;
            const language = document.getElementById('regLanguage').value;

            if (!name || !email || !password || !confirm) {
                const msg = (window.i18n && typeof window.i18n.t === 'function') ? window.i18n.t('allFieldsRequired') : '❌ Todos los campos son obligatorios';
                showMessage('registerMessage', msg, 'error');
                return;
            }
            if (!validateEmail(email)) {
                const msg = (window.i18n && typeof window.i18n.t === 'function') ? window.i18n.t('invalidEmail') : '❌ Correo inválido';
                showMessage('registerMessage', msg, 'error');
                return;
            }
            if (password.length < 4) {
                const msg = (window.i18n && typeof window.i18n.t === 'function') ? window.i18n.t('passwordTooShort') : '❌ La contraseña debe tener al menos 4 caracteres';
                showMessage('registerMessage', msg, 'error');
                return;
            }
            if (password !== confirm) {
                const msg = (window.i18n && typeof window.i18n.t === 'function') ? window.i18n.t('passwordsMismatch') : '❌ Las contraseñas no coinciden';
                showMessage('registerMessage', msg, 'error');
                return;
            }

            const newUser = {
                name: name,
                email: email,
                password: password,
                language: language,
                createdAt: new Date().toISOString(),
                profileCompleted: false
            };

            const saved = saveUser(newUser);
            if (!saved) {
                const msg = (window.i18n && typeof window.i18n.t === 'function') ? window.i18n.t('emailRegistered') : '⚠️ Este correo ya está registrado';
                showMessage('registerMessage', msg, 'error');
                return;
            }

            localStorage.setItem('foodtales_current_user', JSON.stringify({ email: email, name: name }));
            
            const successMsg = (window.i18n && typeof window.i18n.t === 'function') ? window.i18n.t('accountCreatedRedirect') : '✅ Cuenta creada. Redirigiendo...';
            showMessage('registerMessage', successMsg, 'success');
            setTimeout(() => {
                window.location.href = 'pages/home.html';
            }, 1500);
        });

        // Login - Redirige a pag_inicial.html
        document.getElementById('loginBtn').addEventListener('click', () => {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!email || !password) {
                const msg = (window.i18n && typeof window.i18n.t === 'function') ? window.i18n.t('completeAllFields') : '❌ Completa todos los campos';
                showMessage('loginMessage', msg, 'error');
                return;
            }

            const user = findUserByEmail(email, password);
            if (!user) {
                const msg = (window.i18n && typeof window.i18n.t === 'function') ? window.i18n.t('invalidLogin') : '❌ Correo o contraseña incorrectos';
                showMessage('loginMessage', msg, 'error');
                return;
            }

            localStorage.setItem('foodtales_current_user', JSON.stringify({ email: user.email, name: user.name }));
            
            const successMsg = (window.i18n && typeof window.i18n.t === 'function') ? window.i18n.t('loggingIn') : '✅ Ingresando...';
            showMessage('loginMessage', successMsg, 'success');
            
            setTimeout(() => {
                window.location.href = 'pages/home.html';
            }, 1000);
        });

        // Inicializar idioma (sin redirección automática)
        loadUserLanguageFromSession();
        
       
    </script>
</body>
</html>
