<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>FoodTales - Inicio de Sesión</title>
    <link rel="stylesheet" href="css/index.css">
</head>
<body class="dark">
    <div class="card">
        <div class="header">
            <div class="logo">
                <h1>🍜 FoodTales</h1>
                <p class="logo-sub">sabores que cuentan historias</p>
            </div>
            <button class="theme-toggle" id="themeToggle">🌙</button>
        </div>

        <!-- Login Form (visible por defecto) -->
        <div id="loginForm">
            <h2 class="form-title" data-i18n="welcome">Bienvenidx</h2>
            <div class="input-group">
                <label data-i18n="email">📧 Correo electrónico</label>
                <input type="email" id="loginEmail" placeholder="tú@ejemplo.com">
            </div>
            <div class="input-group">
                <label data-i18n="password">🔒 Contraseña</label>
                <input type="password" id="loginPassword" placeholder="••••••••">
            </div>
            <button class="btn" id="loginBtn" data-i18n="loginBtn">Iniciar sesión</button>
            <div class="switch-link" id="goToRegister" data-i18n="goToRegister">✨ ¿No tienes cuenta? Créala aquí</div>
            <div id="loginMessage" class="message"></div>
        </div>

        <!-- Register Form (oculto al inicio) -->
        <div id="registerForm" style="display: none;">
            <h2 class="form-title" data-i18n="createAccount">Crear cuenta</h2>
            <div class="input-group">
                <label data-i18n="fullNameReg">🧑‍🍳 Nombre completo</label>
                <input type="text" id="regName" placeholder="Tu nombre">
            </div>
            <div class="input-group">
                <label data-i18n="email">📧 Correo electrónico</label>
                <input type="email" id="regEmail" placeholder="tú@ejemplo.com">
            </div>
            <div class="input-group">
                <label data-i18n="password">🔒 Contraseña</label>
                <input type="password" id="regPassword" placeholder="Mínimo 4 caracteres">
            </div>
            <div class="input-group">
                <label data-i18n="confirmPassword">🔁 Confirmar contraseña</label>
                <input type="password" id="regConfirmPassword" placeholder="Repite la contraseña">
            </div>
            <div class="input-group">
                <label data-i18n="languagePref">🌍 Idioma preferido</label>
                <select id="regLanguage">
                    <option value="español">Español</option>
                    <option value="inglés">English</option>
                </select>
            </div>
            <button class="btn" id="registerBtn" data-i18n="registerBtn">Registrarme</button>
            <div class="switch-link" id="goToLogin" data-i18n="goToLogin">⬅️ Ya tengo cuenta, iniciar sesión</div>
            <div id="registerMessage" class="message"></div>
        </div>
    </div>

    <script>
        // ----- DICCIONARIO DE TRADUCCIONES PARA LOGIN -----
        const translations = {
            español: {
                welcome: "Bienvenidx",
                email: "📧 Correo electrónico",
                password: "🔒 Contraseña",
                loginBtn: "Iniciar sesión",
                goToRegister: "✨ ¿No tienes cuenta? Créala aquí",
                createAccount: "Crear cuenta",
                fullNameReg: "🧑‍🍳 Nombre completo",
                confirmPassword: "🔁 Confirmar contraseña",
                languagePref: "🌍 Idioma preferido",
                registerBtn: "Registrarme",
                goToLogin: "⬅️ Ya tengo cuenta, iniciar sesión",
                logoSub: "sabores que cuentan historias",
                emailPlaceholder: "tú@ejemplo.com",
                namePlaceholder: "Tu nombre",
                passwordPlaceholder: "Mínimo 4 caracteres",
                confirmPlaceholder: "Repite la contraseña"
            },
            inglés: {
                welcome: "Welcome",
                email: "📧 Email",
                password: "🔒 Password",
                loginBtn: "Log in",
                goToRegister: "✨ Don't have an account? Create one",
                createAccount: "Create account",
                fullNameReg: "🧑‍🍳 Full name",
                confirmPassword: "🔁 Confirm password",
                languagePref: "🌍 Preferred language",
                registerBtn: "Sign up",
                goToLogin: "⬅️ Already have an account? Log in",
                logoSub: "flavors that tell stories",
                emailPlaceholder: "you@example.com",
                namePlaceholder: "Your name",
                passwordPlaceholder: "Minimum 4 characters",
                confirmPlaceholder: "Repeat password"
            }
        };

        let currentLanguage = "español";

        function applyLoginLanguage(lang) {
            currentLanguage = lang;
            const t = translations[lang];
            if (!t) return;
            
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (t[key]) {
                    if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') {
                        // No aplicamos placeholder aquí porque son específicos
                    } else if (el.tagName === 'BUTTON') {
                        el.innerHTML = t[key];
                    } else if (el.tagName === 'LABEL') {
                        el.innerHTML = t[key];
                    } else if (el.tagName === 'H2') {
                        el.innerHTML = t[key];
                    } else if (el.classList.contains('switch-link')) {
                        el.innerHTML = t[key];
                    } else {
                        el.innerHTML = t[key];
                    }
                }
            });
            
            // Placeholders específicos
            const loginEmail = document.getElementById('loginEmail');
            if (loginEmail) loginEmail.placeholder = t.emailPlaceholder;
            
            const regEmail = document.getElementById('regEmail');
            if (regEmail) regEmail.placeholder = t.emailPlaceholder;
            
            const regName = document.getElementById('regName');
            if (regName) regName.placeholder = t.namePlaceholder;
            
            const regPassword = document.getElementById('regPassword');
            if (regPassword) regPassword.placeholder = t.passwordPlaceholder;
            
            const regConfirm = document.getElementById('regConfirmPassword');
            if (regConfirm) regConfirm.placeholder = t.confirmPlaceholder;
            
            const loginPassword = document.getElementById('loginPassword');
            if (loginPassword) loginPassword.placeholder = "••••••••";
            
            const logoSub = document.querySelector('.logo-sub');
            if (logoSub) logoSub.textContent = t.logoSub;
        }

        // ----- TEMA OSCURO/CLARO -----
        const themeToggle = document.getElementById('themeToggle');
        const body = document.body;

        function loadTheme() {
            const savedTheme = localStorage.getItem('foodtales_theme');
            if (savedTheme === 'light') {
                body.classList.remove('dark');
                body.classList.add('light');
                themeToggle.textContent = '☀️';
            } else {
                body.classList.remove('light');
                body.classList.add('dark');
                themeToggle.textContent = '🌙';
            }
        }

        themeToggle.addEventListener('click', () => {
            if (body.classList.contains('dark')) {
                body.classList.remove('dark');
                body.classList.add('light');
                localStorage.setItem('foodtales_theme', 'light');
                themeToggle.textContent = '☀️';
            } else {
                body.classList.remove('light');
                body.classList.add('dark');
                localStorage.setItem('foodtales_theme', 'dark');
                themeToggle.textContent = '🌙';
            }
        });

        loadTheme();

        // ----- ALTERNAR FORMULARIOS -----
        const loginDiv = document.getElementById('loginForm');
        const registerDiv = document.getElementById('registerForm');
        const goToRegisterBtn = document.getElementById('goToRegister');
        const goToLoginBtn = document.getElementById('goToLogin');

        goToRegisterBtn.addEventListener('click', () => {
            loginDiv.style.display = 'none';
            registerDiv.style.display = 'block';
            clearMessages();
        });

        goToLoginBtn.addEventListener('click', () => {
            registerDiv.style.display = 'none';
            loginDiv.style.display = 'block';
            clearMessages();
        });

        function clearMessages() {
            document.getElementById('loginMessage').innerHTML = '';
            document.getElementById('registerMessage').innerHTML = '';
        }

        function showMessage(elementId, text, type, lang) {
            const msgDiv = document.getElementById(elementId);
            msgDiv.innerHTML = text;
            msgDiv.className = `message ${type}`;
            setTimeout(() => {
                if (msgDiv.innerHTML === text) msgDiv.innerHTML = '';
            }, 3000);
        }

        // ----- VALIDACIONES -----
        function validateEmail(email) {
            return /^[^\s@]+@([^\s@]+\.)+[^\s@]+$/.test(email);
        }

        function saveUser(userData) {
            let users = JSON.parse(localStorage.getItem('foodtales_users')) || [];
            const exists = users.some(u => u.email === userData.email);
            if (exists) return false;
            users.push(userData);
            localStorage.setItem('foodtales_users', JSON.stringify(users));
            return true;
        }

        function findUserByEmail(email, password) {
            const users = JSON.parse(localStorage.getItem('foodtales_users')) || [];
            return users.find(u => u.email === email && u.password === password);
        }

        // Cargar idioma del usuario actual si existe sesión previa
        function loadUserLanguageFromSession() {
            const currentUser = JSON.parse(localStorage.getItem('foodtales_current_user'));
            if (currentUser && currentUser.email) {
                const users = JSON.parse(localStorage.getItem('foodtales_users')) || [];
                const user = users.find(u => u.email === currentUser.email);
                if (user && user.language) {
                    if (user.language === 'inglés') {
                        applyLoginLanguage('inglés');
                    } else {
                        applyLoginLanguage('español');
                    }
                    return;
                }
            }
            // Si no hay sesión, usar español por defecto
            applyLoginLanguage('español');
        }

        // Registrar
        document.getElementById('registerBtn').addEventListener('click', () => {
            const name = document.getElementById('regName').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirmPassword').value;
            const language = document.getElementById('regLanguage').value;

            if (!name || !email || !password || !confirm) {
                const msg = currentLanguage === 'español' ? '❌ Todos los campos son obligatorios' : '❌ All fields are required';
                showMessage('registerMessage', msg, 'error', currentLanguage);
                return;
            }
            if (!validateEmail(email)) {
                const msg = currentLanguage === 'español' ? '❌ Correo inválido' : '❌ Invalid email';
                showMessage('registerMessage', msg, 'error', currentLanguage);
                return;
            }
            if (password.length < 4) {
                const msg = currentLanguage === 'español' ? '❌ La contraseña debe tener al menos 4 caracteres' : '❌ Password must be at least 4 characters';
                showMessage('registerMessage', msg, 'error', currentLanguage);
                return;
            }
            if (password !== confirm) {
                const msg = currentLanguage === 'español' ? '❌ Las contraseñas no coinciden' : '❌ Passwords do not match';
                showMessage('registerMessage', msg, 'error', currentLanguage);
                return;
            }

            const newUser = {
                name: name,
                email: email,
                password: password,
                language: language,
                createdAt: new Date().toISOString(),
                profileCompleted: false
            };

            const saved = saveUser(newUser);
            if (!saved) {
                const msg = currentLanguage === 'español' ? '⚠️ Este correo ya está registrado' : '⚠️ This email is already registered';
                showMessage('registerMessage', msg, 'error', currentLanguage);
                return;
            }

            localStorage.setItem('foodtales_current_user', JSON.stringify({ email: email, name: name }));
            
            const successMsg = currentLanguage === 'español' ? '✅ Cuenta creada. Redirigiendo...' : '✅ Account created. Redirecting...';
            showMessage('registerMessage', successMsg, 'success', currentLanguage);
            setTimeout(() => {
                window.location.href = 'pages/home.html';
            }, 1500);
        });

        // Login - Redirige a pag_inicial.html
        document.getElementById('loginBtn').addEventListener('click', () => {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!email || !password) {
                const msg = currentLanguage === 'español' ? '❌ Completa todos los campos' : '❌ Complete all fields';
                showMessage('loginMessage', msg, 'error', currentLanguage);
                return;
            }

            const user = findUserByEmail(email, password);
            if (!user) {
                const msg = currentLanguage === 'español' ? '❌ Correo o contraseña incorrectos' : '❌ Incorrect email or password';
                showMessage('loginMessage', msg, 'error', currentLanguage);
                return;
            }

            localStorage.setItem('foodtales_current_user', JSON.stringify({ email: user.email, name: user.name }));
            
            const successMsg = currentLanguage === 'español' ? '✅ Ingresando...' : '✅ Logging in...';
            showMessage('loginMessage', successMsg, 'success', currentLanguage);
            
            setTimeout(() => {
                window.location.href = 'pages/home.html';
            }, 1000);
        });

        // Inicializar idioma (sin redirección automática)
        loadUserLanguageFromSession();
        
       
    </script>
</body>
</html>
